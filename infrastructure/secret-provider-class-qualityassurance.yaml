apiVersion: secrets-store.csi.x-k8s.io/v1alpha1
kind: SecretProviderClass
metadata:
  name: RepoUniqueNormalisedIdentifier-api-vault
  namespace: <qualityassurance-namespace>
spec:
  provider: azure
  # No secretObjects: the secret is consumed ONLY via the tmpfs file mount
  # (key-per-file), never synced to a Kubernetes Secret or env var — GO-D6/G11.
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "<identity-id>"
    keyvaultName: "<qualityassurance-keyvault-name>"
    cloudName: ""
    cloudEnvFileName: ""
    objects: |
      array:
        - |
          objectName: DbConnectionString
          objectAlias: DbConnectionString
          objectType: secret
          objectVersion: ""

    tenantId: "<tenant-id>"
