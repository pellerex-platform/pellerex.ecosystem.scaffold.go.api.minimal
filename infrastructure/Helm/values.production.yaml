replicaCount: 2
deploymentStrategy: RollingUpdate

image:
  repository: pellerex/RepoUniqueNormalisedIdentifier
  pullPolicy: Always
  tag: "v1.0.0"

env:
  - name: "ENVIRONMENT"
    value: "production"
  - name: "PORT"
    value: "8890"
  - name: "GIN_MODE"
    value: "release"
  # info, not warn: the per-request "HTTP request" logs are INFO — at warn they would be
  # suppressed in every sink (stdout, files, App Insights) and prod would look log-dead.
  # Matches the .NET scaffold's production level (Information).
  - name: "LOG_LEVEL"
    value: "info"

global:
  envValuesFrom:
    Runtime__IpAddress: status.podIP

secretProviderClass:
  enabled: <secret-provider-class-enabled>

volumes:
  - name: RepoUniqueNormalisedIdentifier-keyvault-volume
    csiSecretProviderClass: RepoUniqueNormalisedIdentifier-api-vault

volumeMounts:
  - name: RepoUniqueNormalisedIdentifier-keyvault-volume
    readOnly: true
    mountPath: /mnt/secrets-store

# Writable emptyDir for the daily-rolling file sinks (must match config.{env}.json
# file_directory). emptyDir is ephemeral — files complement stdout/App Insights,
# they are not the durable store.
logging:
  directory: /var/log/app

# OpenTelemetry Collector sidecar — delivers OTLP (traces/metrics/logs) to Azure
# Application Insights. This is the App Insights leg for Go (no in-process AI SDK,
# GO-D7). To use a shared cluster gateway instead of a per-pod sidecar, set
# enabled=false and point OTEL_EXPORTER_OTLP_ENDPOINT (env) at the gateway service.
otelCollector:
  enabled: true
  # Tag verified against Docker Hub 2026-07-15 (0.115.0 no longer exists there).
  image: "otel/opentelemetry-collector-contrib:0.156.0"
  connectionString: "<azure-app-insights-connection-string-in-production>"
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

imagePullSecrets:
  - name: image-pull-secret
nameOverride: ""
fullnameOverride: "<managed-service-name>"

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8890

ingress:
  enabled: true
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($http_origin ~* "^https?://((?:www\.pellerex\.com))$") {
        set $cors "true";
      }
      if ($request_method = 'OPTIONS') {
        set $cors "${cors}options";
      }

      if ($cors = "true") {
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'x-signalr-user-agent,x-requested-with,Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
      }

      if ($cors = "trueoptions") {
        add_header 'Access-Control-Allow-Origin' "$http_origin";
        add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, DELETE, PATCH, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'x-signalr-user-agent,x-requested-with,Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent';
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        add_header 'Content-Length' 0;
        return 204;
      }

    nginx.ingress.kubernetes.io/rewrite-target: /$2
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: api.pellerex.com
      paths:
        - path: /production/RepoUniqueNormalisedIdentifier(/|$)(.*)
          pathType: Prefix
  defaultBackend:
    service:

resources: {}
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
